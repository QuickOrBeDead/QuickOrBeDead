<svg width="300" height="215" viewBox="0 0 300 215" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
    <title id="titleId" />
    <desc id="descId" />
    <style>
        .header {
        font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
        fill: #fff;
        animation: fadeInAnimation 0.8s ease-in-out forwards;
        }

        @supports(-moz-appearance: auto) {

        /* Selector detects Firefox */
        .header {
        font-size: 15.5px;
        }
        }

        @keyframes slideInAnimation {
        from {
        width: 0;
        }

        to {
        width: calc(100%-100px);
        }
        }

        @keyframes growWidthAnimation {
        from {
        width: 0;
        }

        to {
        width: 100%;
        }
        }

        .stat {
        font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif;
        fill: #9f9f9f;
        }

        @supports(-moz-appearance: auto) {

        /* Selector detects Firefox */
        .stat {
        font-size: 12px;
        }
        }

        .bold {
        font-weight: 700
        }

        .lang-name {
        font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
        fill: #9f9f9f;
        }

        .stagger {
        opacity: 0;
        animation: fadeInAnimation 0.3s ease-in-out forwards;
        }

        #rect-mask rect {
        animation: slideInAnimation 1s ease-in-out forwards;
        }

        .lang-progress {
        animation: growWidthAnimation 0.6s ease-in-out forwards;
        }

        /* Animations */
        @keyframes scaleInAnimation {
        from {
        transform: translate(-5px, 5px) scale(0);
        }

        to {
        transform: translate(-5px, 5px) scale(1);
        }
        }

        @keyframes fadeInAnimation {
        from {
        opacity: 0;
        }

        to {
        opacity: 1;
        }
        }
    </style>
    <rect data-testid="card-bg" x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="299" fill="#151515" stroke-opacity="1" />
